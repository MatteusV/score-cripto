app = "score-cripto-users"
primary_region = "iad"

# Sem [build] — a imagem é fornecida via --image no release.yml

[deploy]
  strategy = "rolling"
  release_command = "node_modules/.bin/prisma migrate deploy"

[env]
  NODE_ENV = "production"
  PORT     = "3003"

# Acessível APENAS via Flycast (score-cripto-users.flycast:3003) por outros
# apps da org Fly. Nenhum tráfego externo entra direto — tudo passa pelo
# api-gateway, que é o único boundary público da plataforma.
# Stripe webhooks também chegam pelo api-gateway (passthrough preservando
# raw body + stripe-signature). Ver epic score-cripto-6se.
[[services]]
  internal_port = 3003
  protocol      = "tcp"
  auto_stop_machines   = false
  auto_start_machines  = true
  min_machines_running = 1

  [[services.ports]]
    port     = 3003
    handlers = ["http"]

  [services.concurrency]
    type       = "requests"
    hard_limit = 150
    soft_limit = 120

  [[services.http_checks]]
    interval     = "15s"
    timeout      = "5s"
    grace_period = "30s"
    method       = "GET"
    path         = "/health"

[[vm]]
  size   = "shared-cpu-1x"
  memory = "256mb"
