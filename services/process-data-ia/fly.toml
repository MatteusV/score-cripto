app = "score-cripto-process-data-ia"
primary_region = "iad"

# Sem [build] — a imagem é fornecida via --image no release.yml

[deploy]
  strategy = "rolling"
  release_command = "node_modules/.bin/prisma migrate deploy"

[env]
  NODE_ENV    = "production"
  HEALTH_PORT = "3002"

# Worker AMQP: sem [http_service] (não é público).
# O /health fica acessível via 6PN para health checks do Fly e via
# Flycast (score-cripto-process-data-ia.flycast:3002) para outros apps
# da mesma org Fly. Ver https://fly.io/docs/networking/flycast/
[[services]]
  internal_port = 3002
  protocol      = "tcp"
  auto_stop_machines   = false
  auto_start_machines  = true
  min_machines_running = 1

  [[services.ports]]
    port     = 3002
    handlers = ["http"]

  [services.concurrency]
    type       = "requests"
    hard_limit = 100
    soft_limit = 80

  [[services.http_checks]]
    interval     = "15s"
    timeout      = "5s"
    grace_period = "30s"
    method       = "GET"
    path         = "/health"

[[vm]]
  size   = "shared-cpu-1x"
  memory = "256mb"
