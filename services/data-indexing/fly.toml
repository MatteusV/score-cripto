app = "score-cripto-data-indexing"
primary_region = "iad"

# Sem [build] — a imagem é fornecida via --image no release.yml

[deploy]
  strategy = "rolling"
  # Sem release_command — Elixir release, não usa Prisma

[env]
  PORT     = "4000"
  MIX_ENV  = "prod"

[http_service]
  internal_port        = 4000
  force_https          = true
  auto_stop_machines   = false
  auto_start_machines  = true
  min_machines_running = 1

  [http_service.concurrency]
    type       = "requests"
    hard_limit = 150
    soft_limit = 120

  [[http_service.checks]]
    interval     = "15s"
    timeout      = "5s"
    grace_period = "30s"
    method       = "GET"
    path         = "/api/health"

[[vm]]
  size   = "shared-cpu-1x"
  memory = "256mb"
