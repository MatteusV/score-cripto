app = "score-cripto-data-search"
primary_region = "iad"

# Sem [build] — a imagem é fornecida via --image no release.yml

[deploy]
  strategy = "rolling"
  # Sem release_command — Go binário, não usa Prisma

[env]
  HTTP_PORT = "8080"

# Worker AMQP: sem [http_service] (não é público).
# O /health fica acessível via 6PN para health checks do Fly e via
# Flycast (score-cripto-data-search.flycast:8080) para outros apps
# da mesma org Fly. Ver https://fly.io/docs/networking/flycast/
[[services]]
  internal_port = 8080
  protocol      = "tcp"
  auto_stop_machines   = false
  auto_start_machines  = true
  min_machines_running = 1

  [[services.ports]]
    port     = 8080
    handlers = ["http"]

  [services.concurrency]
    type       = "requests"
    hard_limit = 200
    soft_limit = 150

  [[services.http_checks]]
    interval     = "15s"
    timeout      = "5s"
    grace_period = "30s"
    method       = "GET"
    path         = "/health"

[[vm]]
  size   = "shared-cpu-1x"
  memory = "256mb"
