<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Score Cripto — Histórico</title>
<link rel="stylesheet" href="colors_and_type.css"/>
<style>
  html, body, #root { height: 100%; }
  body { margin: 0; background: var(--background); color: var(--foreground); font-family: var(--font-sans); }
  * { box-sizing: border-box; }
  button:hover { filter: brightness(1.08); }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: color-mix(in oklab, var(--foreground), transparent 85%); border-radius: 999px; border: 2px solid transparent; background-clip: padding-box; }
  ::-webkit-scrollbar-thumb:hover { background: color-mix(in oklab, var(--foreground), transparent 75%); }
  @keyframes scDotPulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.35; } }
  @keyframes scSpin { to { transform: rotate(360deg); } }
  @keyframes scFadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
  #root > div { animation: scFadeUp .6s cubic-bezier(0.16, 1, 0.3, 1); }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="primitives.jsx"></script>
<script type="text/babel" src="history.jsx"></script>

<script type="text/babel">
(function(){
  const { useState, useEffect } = React;
  const { I, Logo, Btn, Badge, Eyebrow, History } = window;

  const TWEAKS = /*EDITMODE-BEGIN*/{
    "theme": "dark",
    "userName": "Matteus"
  }/*EDITMODE-END*/;

  function SidebarNav({ active, theme, onToggleTheme }) {
    const items = [
      { id:"dashboard", label:"Dashboard", icon:<I.dash/>, href:"Dashboard.html", badge:null },
      { id:"analyze",   label:"Nova análise", icon:<I.search/>, href:"Nova análise.html", badge:null },
      { id:"history",   label:"Histórico", icon:<I.clock/>, href:"Histórico.html", badge:"128" },
      { id:"search",    label:"Explorar", icon:<I.compass/>, href:null, badge:null },
    ];
    const account = [{ id:"billing", label:"Planos & Billing", icon:<I.card/>, href:null }];
    const NavItem = ({it}) => {
      const isActive = active===it.id;
      const inner = (
        <>
          <span style={{width:16,height:16,display:"inline-flex",flexShrink:0,color: isActive ? "var(--primary)":"currentColor"}}>{React.cloneElement(it.icon,{sw: isActive?2.5:1.75})}</span>
          <span style={{flex:1}}>{it.label}</span>
          {it.badge && <span style={{fontSize:10,fontFamily:"var(--font-mono)",color: isActive?"var(--primary)":"var(--muted-foreground)",background: isActive?"color-mix(in oklab, var(--primary), transparent 85%)":"var(--muted)",padding:"1px 6px",borderRadius:6}}>{it.badge}</span>}
        </>
      );
      const style = {
        display:"flex",alignItems:"center",gap:12,padding:"10px 12px",borderRadius:12,
        fontFamily:"var(--font-sans)",fontSize:13,fontWeight:500,textAlign:"left",width:"100%",
        cursor:"pointer",transition:"all .2s",textDecoration:"none",boxSizing:"border-box",
        border: isActive ? "1px solid color-mix(in oklab,var(--primary),transparent 75%)" : "1px solid transparent",
        background: isActive ? "color-mix(in oklab,var(--primary),transparent 90%)" : "transparent",
        color: isActive ? "var(--primary)" : "var(--muted-foreground)",
        boxShadow: isActive ? "inset 0 0 12px oklch(0.74 0.19 66 / 10%)" : "none",
      };
      return it.href ? <a href={it.href} style={style}>{inner}</a> : <button style={style}>{inner}</button>;
    };
    return (
      <aside style={{width:240,background:"var(--sidebar)",borderRight:"1px solid var(--border)",padding:"24px 16px",display:"flex",flexDirection:"column",flexShrink:0,position:"sticky",top:0,height:"100vh"}}>
        <div style={{marginBottom:28}}><Logo/></div>
        <Eyebrow style={{fontSize:10,padding:"0 12px",marginBottom:8}}>Principal</Eyebrow>
        <div style={{display:"flex",flexDirection:"column",gap:2,marginBottom:20}}>
          {items.map(it => <NavItem key={it.id} it={it}/>)}
        </div>
        <Eyebrow style={{fontSize:10,padding:"0 12px",marginBottom:8}}>Conta</Eyebrow>
        <div style={{display:"flex",flexDirection:"column",gap:2}}>
          {account.map(it => <NavItem key={it.id} it={it}/>)}
        </div>
        <div style={{margin:"20px 0 16px",padding:14,borderRadius:14,border:"1px solid var(--gold-ring)",background:"color-mix(in oklab, var(--primary), transparent 92%)",position:"relative",overflow:"hidden"}}>
          <div style={{position:"absolute",top:-20,right:-20,width:80,height:80,borderRadius:"50%",background:"radial-gradient(circle, oklch(0.74 0.19 66 / 40%), transparent 70%)",pointerEvents:"none"}}/>
          <div style={{position:"relative"}}>
            <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:6}}>
              <span style={{width:14,height:14,color:"var(--primary)"}}><I.zap sw={2.5}/></span>
              <Eyebrow style={{fontSize:9,color:"var(--primary)",letterSpacing:"0.2em"}}>PRO</Eyebrow>
            </div>
            <div style={{fontSize:12,fontWeight:600,marginBottom:4}}>2 análises restantes</div>
            <div style={{fontSize:10,color:"var(--muted-foreground)",lineHeight:1.5}}>Reseta em 14 dias. Amplie agora.</div>
          </div>
        </div>
        <div style={{marginTop:"auto",paddingTop:12,borderTop:"1px solid var(--border)"}}>
          <button onClick={onToggleTheme} style={{display:"flex",alignItems:"center",gap:12,padding:"10px 12px",borderRadius:12,width:"100%",border:"none",background:"transparent",cursor:"pointer",color:"var(--muted-foreground)",fontSize:12}}>
            <span style={{width:16,height:16,display:"inline-flex"}}>{theme==="dark"?<I.sun/>:<I.moon/>}</span>
            {theme === "dark" ? "Light theme" : "Dark theme"}
          </button>
          <div style={{display:"flex",alignItems:"center",gap:12,padding:"10px 12px",borderRadius:12}}>
            <div style={{width:34,height:34,borderRadius:10,background:"var(--primary-dim)",color:"var(--primary)",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"var(--font-heading)",fontSize:11,fontWeight:700,border:"1px solid var(--gold-ring)"}}>MV</div>
            <div style={{minWidth:0,flex:1}}>
              <div style={{fontSize:13,fontWeight:500,color:"var(--foreground)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>Matteus Vitor</div>
              <div style={{fontSize:10,color:"var(--muted-foreground)",display:"flex",alignItems:"center",gap:6,fontFamily:"var(--font-mono)"}}>
                <span style={{width:5,height:5,borderRadius:999,background:"var(--accent)"}}/>plano pro
              </div>
            </div>
          </div>
        </div>
      </aside>
    );
  }

  function Topbar({ title, subtitle }) {
    return (
      <header style={{height:64,borderBottom:"1px solid var(--border)",background:"color-mix(in oklab, var(--background) 70%, transparent)",backdropFilter:"blur(24px)",padding:"0 28px",display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,zIndex:10}}>
        <div>
          <div style={{fontFamily:"var(--font-heading)",fontSize:14,fontWeight:700,letterSpacing:"0.15em",color:"var(--foreground)",textTransform:"uppercase"}}>{title}</div>
          {subtitle && <div style={{fontSize:11,color:"var(--muted-foreground)",marginTop:2}}>{subtitle}</div>}
        </div>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{position:"relative"}}>
            <span style={{position:"absolute",left:10,top:"50%",transform:"translateY(-50%)",width:13,height:13,color:"var(--muted-foreground)"}}><I.search/></span>
            <input placeholder="Buscar endereço, chain…" style={{width:260,height:36,borderRadius:10,border:"1px solid var(--border)",background:"var(--input)",color:"var(--foreground)",padding:"0 10px 0 32px",fontSize:12,outline:"none",fontFamily:"var(--font-mono)"}}/>
            <span style={{position:"absolute",right:8,top:"50%",transform:"translateY(-50%)",fontSize:9,color:"var(--muted-foreground)",fontFamily:"var(--font-mono)",background:"var(--muted)",padding:"2px 5px",borderRadius:4,border:"1px solid var(--border)"}}>⌘K</span>
          </div>
          <button style={{display:"flex",alignItems:"center",gap:6,background:"transparent",border:"1px solid var(--border)",color:"var(--muted-foreground)",borderRadius:10,padding:"7px 10px",fontSize:11,cursor:"pointer",fontFamily:"var(--font-mono)"}}>
            <span style={{width:13,height:13}}><I.globe/></span>PT-BR
          </button>
          <button style={{position:"relative",width:36,height:36,borderRadius:10,border:"1px solid var(--border)",background:"transparent",color:"var(--muted-foreground)",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>
            <span style={{width:15,height:15}}><I.bell/></span>
            <span style={{position:"absolute",top:-3,right:-3,width:15,height:15,borderRadius:999,background:"var(--primary)",color:"var(--primary-foreground)",fontSize:9,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center",border:"2px solid var(--background)"}}>3</span>
          </button>
        </div>
      </header>
    );
  }

  function TweaksPanel({ open, tweaks, setTweaks }) {
    if (!open) return null;
    const set = (k, v) => {
      const next = { ...tweaks, [k]: v };
      setTweaks(next);
      window.parent.postMessage({ type: "__edit_mode_set_keys", edits: { [k]: v } }, "*");
    };
    const row = { display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 0",borderTop:"1px solid var(--border)" };
    return (
      <div style={{position:"fixed",bottom:24,right:24,zIndex:500,width:300,padding:18,borderRadius:16,background:"color-mix(in oklab, var(--card), transparent 5%)",border:"1px solid var(--gold-ring)",boxShadow:"0 20px 60px -20px oklch(0.74 0.19 66 / 30%), 0 0 0 1px oklch(0.74 0.19 66 / 12%)",backdropFilter:"blur(24px)",fontFamily:"var(--font-sans)"}}>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}>
          <span style={{width:14,height:14,color:"var(--primary)"}}><I.zap sw={2.5}/></span>
          <Eyebrow style={{fontSize:10,color:"var(--primary)"}}>TWEAKS</Eyebrow>
        </div>
        <div style={row}>
          <span style={{fontSize:12}}>Tema</span>
          <div style={{display:"flex",gap:4}}>
            {["dark","light"].map(t => (
              <button key={t} onClick={()=>set("theme",t)} style={{fontSize:10,padding:"4px 10px",borderRadius:6,border:"1px solid "+(tweaks.theme===t?"var(--gold-ring)":"var(--border)"),background:tweaks.theme===t?"var(--primary-dim)":"transparent",color:tweaks.theme===t?"var(--primary)":"var(--muted-foreground)",fontFamily:"var(--font-heading)",letterSpacing:"0.1em",textTransform:"uppercase",cursor:"pointer"}}>{t}</button>
            ))}
          </div>
        </div>
        <div style={{...row,flexDirection:"column",alignItems:"stretch",gap:6}}>
          <span style={{fontSize:12}}>Nome</span>
          <input defaultValue={tweaks.userName} onBlur={e=>set("userName",e.target.value)} style={{height:30,borderRadius:8,border:"1px solid var(--border)",background:"var(--input)",color:"var(--foreground)",padding:"0 10px",fontSize:12,fontFamily:"var(--font-sans)"}}/>
        </div>
      </div>
    );
  }

  function App() {
    const [tweaks, setTweaks] = useState(TWEAKS);
    const [tweaksOpen, setTweaksOpen] = useState(false);

    useEffect(() => { document.documentElement.setAttribute("data-theme", tweaks.theme); }, [tweaks.theme]);

    useEffect(() => {
      const onMsg = (e) => {
        if (!e.data) return;
        if (e.data.type === "__activate_edit_mode") setTweaksOpen(true);
        if (e.data.type === "__deactivate_edit_mode") setTweaksOpen(false);
      };
      window.addEventListener("message", onMsg);
      window.parent.postMessage({ type: "__edit_mode_available" }, "*");
      return () => window.removeEventListener("message", onMsg);
    }, []);

    const toggleTheme = () => {
      const next = tweaks.theme === "dark" ? "light" : "dark";
      setTweaks({ ...tweaks, theme: next });
      window.parent.postMessage({ type: "__edit_mode_set_keys", edits: { theme: next } }, "*");
    };

    return (
      <div data-screen-label="03 Histórico" style={{display:"flex",minHeight:"100vh",background:"var(--background)",color:"var(--foreground)",fontFamily:"var(--font-sans)",position:"relative"}}>
        <div style={{position:"fixed",inset:0,backgroundImage:"linear-gradient(var(--grid-line) 1px, transparent 1px), linear-gradient(90deg, var(--grid-line) 1px, transparent 1px)",backgroundSize:"60px 60px",pointerEvents:"none",zIndex:0}}/>
        <div style={{position:"fixed",top:-200,right:-200,width:600,height:600,borderRadius:"50%",background:"radial-gradient(circle, oklch(0.74 0.19 66 / 6%), transparent 60%), radial-gradient(circle at 70% 70%, oklch(0.59 0.22 295 / 5%), transparent 50%)",filter:"blur(40px)",pointerEvents:"none",zIndex:0}}/>

        <SidebarNav active="history" theme={tweaks.theme} onToggleTheme={toggleTheme}/>

        <main style={{flex:1,position:"relative",zIndex:1,minWidth:0}}>
          <Topbar title="Histórico" subtitle={`${tweaks.userName} · 128 análises · reasoning auditável`}/>
          <History/>
        </main>

        <TweaksPanel open={tweaksOpen} tweaks={tweaks} setTweaks={setTweaks}/>
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
})();
</script>
</body>
</html>
