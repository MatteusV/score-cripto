<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Score Cripto — Planos & Billing</title>
<link rel="stylesheet" href="colors_and_type.css"/>
<style>
  html, body, #root { height: 100%; }
  body { margin: 0; background: var(--background); color: var(--foreground); font-family: var(--font-sans); }
  * { box-sizing: border-box; }
  ::-webkit-scrollbar { display: none; }
  @keyframes scDotPulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.35; } }

  /* Print-specific */
  @page {
    size: 1440px 2200px;
    margin: 0;
  }
  @media print {
    html, body {
      background: var(--background) !important;
      -webkit-print-color-adjust: exact !important;
      print-color-adjust: exact !important;
      color-adjust: exact !important;
    }
    * {
      -webkit-print-color-adjust: exact !important;
      print-color-adjust: exact !important;
      animation: none !important;
      transition: none !important;
    }
    /* Force sidebar non-sticky and full page rendering */
    aside[style*="sticky"] { position: relative !important; height: auto !important; min-height: 100% !important; }
    header[style*="sticky"] { position: relative !important; }
    /* Avoid breaking cards across pages where possible */
    .print-card, [class*="Card"] { break-inside: avoid; }
    /* Hide the Tweaks panel and any fixed overlays */
    [style*="position:fixed"], [style*="position: fixed"] { display: none !important; }
    /* Re-enable the grid + glow backgrounds which were position:fixed */
    .print-bg { display: block !important; position: absolute !important; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="primitives.jsx"></script>
<script type="text/babel" src="billing.jsx"></script>

<script type="text/babel">
(function(){
  const { useEffect } = React;
  const { I, Logo, Eyebrow, Billing } = window;

  function SidebarNav() {
    const items = [
      { id:"dashboard", label:"Dashboard", icon:<I.dash/> },
      { id:"analyze",   label:"Nova análise", icon:<I.search/> },
      { id:"history",   label:"Histórico", icon:<I.clock/>, badge:"128" },
      { id:"search",    label:"Explorar", icon:<I.compass/> },
    ];
    const account = [{ id:"billing", label:"Planos & Billing", icon:<I.card/>, active:true }];
    const NavItem = ({it}) => (
      <div style={{
        display:"flex",alignItems:"center",gap:12,padding:"10px 12px",borderRadius:12,
        fontFamily:"var(--font-sans)",fontSize:13,fontWeight:500,width:"100%",boxSizing:"border-box",
        border: it.active ? "1px solid color-mix(in oklab,var(--primary),transparent 75%)" : "1px solid transparent",
        background: it.active ? "color-mix(in oklab,var(--primary),transparent 90%)" : "transparent",
        color: it.active ? "var(--primary)" : "var(--muted-foreground)",
        boxShadow: it.active ? "inset 0 0 12px oklch(0.74 0.19 66 / 10%)" : "none",
      }}>
        <span style={{width:16,height:16,display:"inline-flex",flexShrink:0}}>{React.cloneElement(it.icon,{sw: it.active?2.5:1.75})}</span>
        <span style={{flex:1}}>{it.label}</span>
        {it.badge && <span style={{fontSize:10,fontFamily:"var(--font-mono)",color:"var(--muted-foreground)",background:"var(--muted)",padding:"1px 6px",borderRadius:6}}>{it.badge}</span>}
      </div>
    );
    return (
      <aside style={{width:240,background:"var(--sidebar)",borderRight:"1px solid var(--border)",padding:"24px 16px",display:"flex",flexDirection:"column",flexShrink:0}}>
        <div style={{marginBottom:28}}><Logo/></div>
        <Eyebrow style={{fontSize:10,padding:"0 12px",marginBottom:8}}>Principal</Eyebrow>
        <div style={{display:"flex",flexDirection:"column",gap:2,marginBottom:20}}>
          {items.map(it => <NavItem key={it.id} it={it}/>)}
        </div>
        <Eyebrow style={{fontSize:10,padding:"0 12px",marginBottom:8}}>Conta</Eyebrow>
        <div style={{display:"flex",flexDirection:"column",gap:2}}>
          {account.map(it => <NavItem key={it.id} it={it}/>)}
        </div>
        <div style={{margin:"20px 0 16px",padding:14,borderRadius:14,border:"1px solid var(--gold-ring)",background:"color-mix(in oklab, var(--primary), transparent 92%)",position:"relative",overflow:"hidden"}}>
          <div style={{position:"absolute",top:-20,right:-20,width:80,height:80,borderRadius:"50%",background:"radial-gradient(circle, oklch(0.74 0.19 66 / 40%), transparent 70%)"}}/>
          <div style={{position:"relative"}}>
            <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:6}}>
              <span style={{width:14,height:14,color:"var(--primary)"}}><I.zap sw={2.5}/></span>
              <Eyebrow style={{fontSize:9,color:"var(--primary)",letterSpacing:"0.2em"}}>PRO</Eyebrow>
            </div>
            <div style={{fontSize:12,fontWeight:600,marginBottom:4}}>2 análises restantes</div>
            <div style={{fontSize:10,color:"var(--muted-foreground)",lineHeight:1.5}}>Reseta em 14 dias. Amplie agora.</div>
          </div>
        </div>
        <div style={{marginTop:40,paddingTop:12,borderTop:"1px solid var(--border)"}}>
          <div style={{display:"flex",alignItems:"center",gap:12,padding:"10px 12px",borderRadius:12}}>
            <div style={{width:34,height:34,borderRadius:10,background:"var(--primary-dim)",color:"var(--primary)",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"var(--font-heading)",fontSize:11,fontWeight:700,border:"1px solid var(--gold-ring)"}}>MV</div>
            <div style={{minWidth:0,flex:1}}>
              <div style={{fontSize:13,fontWeight:500,color:"var(--foreground)"}}>Matteus Vitor</div>
              <div style={{fontSize:10,color:"var(--muted-foreground)",display:"flex",alignItems:"center",gap:6,fontFamily:"var(--font-mono)"}}>
                <span style={{width:5,height:5,borderRadius:999,background:"var(--accent)"}}/>plano pro
              </div>
            </div>
          </div>
        </div>
      </aside>
    );
  }

  function Topbar() {
    return (
      <header style={{height:64,borderBottom:"1px solid var(--border)",background:"color-mix(in oklab, var(--background) 70%, transparent)",padding:"0 28px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div>
          <div style={{fontFamily:"var(--font-heading)",fontSize:14,fontWeight:700,letterSpacing:"0.15em",color:"var(--foreground)",textTransform:"uppercase"}}>Planos & Billing</div>
          <div style={{fontSize:11,color:"var(--muted-foreground)",marginTop:2}}>Gerencie sua assinatura, uso e faturas</div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{display:"flex",alignItems:"center",gap:6,border:"1px solid var(--border)",color:"var(--muted-foreground)",borderRadius:10,padding:"7px 10px",fontSize:11,fontFamily:"var(--font-mono)"}}>
            <span style={{width:13,height:13}}><I.globe/></span>PT-BR
          </div>
          <div style={{position:"relative",width:36,height:36,borderRadius:10,border:"1px solid var(--border)",color:"var(--muted-foreground)",display:"flex",alignItems:"center",justifyContent:"center"}}>
            <span style={{width:15,height:15}}><I.bell/></span>
          </div>
        </div>
      </header>
    );
  }

  function App() {
    useEffect(() => { document.documentElement.setAttribute("data-theme", "dark"); }, []);
    return (
      <div style={{display:"flex",minHeight:"100vh",background:"var(--background)",color:"var(--foreground)",fontFamily:"var(--font-sans)",position:"relative"}}>
        <div className="print-bg" style={{position:"absolute",inset:0,backgroundImage:"linear-gradient(var(--grid-line) 1px, transparent 1px), linear-gradient(90deg, var(--grid-line) 1px, transparent 1px)",backgroundSize:"60px 60px",pointerEvents:"none",zIndex:0}}/>
        <div className="print-bg" style={{position:"absolute",top:-200,right:-200,width:600,height:600,borderRadius:"50%",background:"radial-gradient(circle, oklch(0.74 0.19 66 / 6%), transparent 60%)",filter:"blur(40px)",pointerEvents:"none",zIndex:0}}/>
        <SidebarNav/>
        <main style={{flex:1,position:"relative",zIndex:1,minWidth:0}}>
          <Topbar/>
          <Billing/>
        </main>
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

  // Auto-print once fonts + Babel + React have rendered
  (async () => {
    try { if (document.fonts && document.fonts.ready) await document.fonts.ready; } catch (e) {}
    await new Promise(r => setTimeout(r, 800));
    window.print();
  })();
})();
</script>
</body>
</html>
