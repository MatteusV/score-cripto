name: score-cripto

services:
  process-data-ia-postgres:
    image: postgres:17-alpine
    container_name: score-cripto-process-data-ia-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${PROCESS_DATA_IA_POSTGRES_DB:-score_cripto_scoring}
      POSTGRES_USER: ${PROCESS_DATA_IA_POSTGRES_USER:-score_cripto}
      POSTGRES_PASSWORD: ${PROCESS_DATA_IA_POSTGRES_PASSWORD:-score_cripto}
    ports:
      - "${PROCESS_DATA_IA_POSTGRES_HOST_PORT:-5433}:5432"
    volumes:
      - process_data_ia_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${PROCESS_DATA_IA_POSTGRES_USER:-score_cripto} -d ${PROCESS_DATA_IA_POSTGRES_DB:-score_cripto_scoring}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  data-search-redis:
    image: redis:7-alpine
    container_name: score-cripto-data-search-redis
    restart: unless-stopped
    ports:
      - "${DATA_SEARCH_REDIS_HOST_PORT:-6380}:6379"
    volumes:
      - data_search_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:4-management-alpine
    container_name: score-cripto-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-guest}
    ports:
      - "${RABBITMQ_HOST_PORT:-5673}:5672"
      - "${RABBITMQ_MANAGEMENT_HOST_PORT:-15673}:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 10

  api-gateway-postgres:
    image: postgres:17-alpine
    container_name: score-cripto-api-gateway-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${API_GATEWAY_POSTGRES_DB:-score_cripto_gateway}
      POSTGRES_USER: ${API_GATEWAY_POSTGRES_USER:-score_cripto}
      POSTGRES_PASSWORD: ${API_GATEWAY_POSTGRES_PASSWORD:-score_cripto}
    ports:
      - "${API_GATEWAY_POSTGRES_HOST_PORT:-5434}:5432"
    volumes:
      - api_gateway_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${API_GATEWAY_POSTGRES_USER:-score_cripto} -d ${API_GATEWAY_POSTGRES_DB:-score_cripto_gateway}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  api-gateway:
    image: node:22-bookworm-slim
    container_name: score-cripto-api-gateway
    restart: unless-stopped
    working_dir: /app
    depends_on:
      api-gateway-postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    env_file:
      - path: ./services/api-gateway/.env
        required: false
    environment:
      PORT: 3001
      NODE_ENV: development
      DATABASE_URL: postgresql://${API_GATEWAY_POSTGRES_USER:-score_cripto}:${API_GATEWAY_POSTGRES_PASSWORD:-score_cripto}@api-gateway-postgres:5432/${API_GATEWAY_POSTGRES_DB:-score_cripto_gateway}?schema=public
      RABBITMQ_URL: amqp://${RABBITMQ_DEFAULT_USER:-guest}:${RABBITMQ_DEFAULT_PASS:-guest}@rabbitmq:5672
      CHOKIDAR_USEPOLLING: ${CHOKIDAR_USEPOLLING:-1}
    volumes:
      - ./services/api-gateway:/app
      - api_gateway_node_modules:/app/node_modules
      - api_gateway_pnpm_store:/pnpm/store
    ports:
      - "${API_GATEWAY_HOST_PORT:-3001}:3001"
    command:
      [
        "sh",
        "-lc",
        "corepack enable && pnpm install --frozen-lockfile && pnpm exec prisma generate && pnpm exec prisma db push --skip-generate && pnpm dev",
      ]

  process-data-ia:
    image: node:22-bookworm-slim
    container_name: score-cripto-process-data-ia
    restart: unless-stopped
    working_dir: /app
    depends_on:
      process-data-ia-postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    env_file:
      - path: ./services/process-data-ia/.env
        required: false
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://${PROCESS_DATA_IA_POSTGRES_USER:-score_cripto}:${PROCESS_DATA_IA_POSTGRES_PASSWORD:-score_cripto}@process-data-ia-postgres:5432/${PROCESS_DATA_IA_POSTGRES_DB:-score_cripto_scoring}?schema=public
      RABBITMQ_URL: amqp://${RABBITMQ_DEFAULT_USER:-guest}:${RABBITMQ_DEFAULT_PASS:-guest}@rabbitmq:5672
      SCORE_VALIDITY_HOURS: ${SCORE_VALIDITY_HOURS:-24}
      CHOKIDAR_USEPOLLING: ${CHOKIDAR_USEPOLLING:-1}
    volumes:
      - ./services/process-data-ia:/app
      - process_data_ia_node_modules:/app/node_modules
      - process_data_ia_pnpm_store:/pnpm/store
    command:
      [
        "sh",
        "-lc",
        "corepack enable && pnpm install --frozen-lockfile && pnpm exec prisma generate && pnpm exec prisma db push --skip-generate --accept-data-loss && pnpm dev",
      ]

  data-search:
    image: golang:1.26-alpine
    container_name: score-cripto-data-search
    restart: unless-stopped
    working_dir: /app
    depends_on:
      data-search-redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    env_file:
      - path: ./services/data-search/.env
        required: false
    environment:
      PORT: 8080
      REDIS_URL: redis://data-search-redis:6379
      RABBITMQ_URL: amqp://${RABBITMQ_DEFAULT_USER:-guest}:${RABBITMQ_DEFAULT_PASS:-guest}@rabbitmq:5672
      CACHE_TTL_MINUTES: ${CACHE_TTL_MINUTES:-20}
    volumes:
      - ./services/data-search:/app
      - data_search_go_pkg_cache:/go/pkg/mod
      - data_search_go_build_cache:/root/.cache/go-build
    ports:
      - "${DATA_SEARCH_HOST_PORT:-8080}:8080"
    command:
      [
        "sh",
        "-c",
        "apk add --no-cache git && go install github.com/air-verse/air@latest && /go/bin/air -c .air.toml",
      ]

  data-indexing-meilisearch:
    image: getmeili/meilisearch:v1.12
    container_name: score-cripto-data-indexing-meilisearch
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-score_cripto_meili}
      MEILI_ENV: development
    ports:
      - "${DATA_INDEXING_MEILISEARCH_HOST_PORT:-7701}:7700"
    volumes:
      - data_indexing_meilisearch_data:/meili_data
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:7700/health"]
      interval: 10s
      timeout: 5s
      retries: 10

  data-indexing:
    image: elixir:1.19-alpine
    container_name: score-cripto-data-indexing
    restart: unless-stopped
    working_dir: /app
    depends_on:
      rabbitmq:
        condition: service_healthy
      data-indexing-meilisearch:
        condition: service_healthy
    env_file:
      - path: ./services/data-indexing/.env
        required: false
    environment:
      PORT: 4000
      MIX_ENV: dev
      MEILISEARCH_URL: http://data-indexing-meilisearch:7700
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-score_cripto_meili}
      MEILISEARCH_INDEX: ${MEILISEARCH_INDEX:-wallets}
      RABBITMQ_URL: amqp://${RABBITMQ_DEFAULT_USER:-guest}:${RABBITMQ_DEFAULT_PASS:-guest}@rabbitmq:5672
      RABBITMQ_EXCHANGE: ${RABBITMQ_EXCHANGE:-score-cripto.events}
      RABBITMQ_QUEUE: ${DATA_INDEXING_RABBITMQ_QUEUE:-data-indexing.wallet.events}
      CACHE_TTL_MINUTES: ${DATA_INDEXING_CACHE_TTL_MINUTES:-30}
      BROADWAY_BATCH_SIZE: ${DATA_INDEXING_BROADWAY_BATCH_SIZE:-10}
      BROADWAY_BATCH_TIMEOUT_MS: ${DATA_INDEXING_BROADWAY_BATCH_TIMEOUT_MS:-1000}
    volumes:
      - ./services/data-indexing:/app
      - data_indexing_deps:/app/deps
      - data_indexing_build:/app/_build
      - data_indexing_mix:/root/.mix
    ports:
      - "${DATA_INDEXING_HOST_PORT:-4000}:4000"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:4000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 10
    command:
      [
        "sh",
        "-c",
        "apk add --no-cache build-base git wget watchexec && (mix local.hex --force || mix archive.install github hexpm/hex branch latest --force) && mix local.rebar --force && mix deps.get && watchexec -r -e ex,exs -- mix run --no-halt",
      ]

  web-app:
    image: node:22-alpine
    container_name: score-cripto-web-app
    restart: unless-stopped
    working_dir: /app
    depends_on:
      - api-gateway
    env_file:
      - path: ./services/web-app/.env
        required: false
    environment:
      PORT: 3000
      NODE_ENV: development
      NEXT_TELEMETRY_DISABLED: 1
      # Server-side (API routes): usa o nome do serviço Docker
      API_BASE_URL: ${API_BASE_URL:-http://api-gateway:3001}
      # Client-side (browser): usa localhost com porta exposta
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:3001}
      CHOKIDAR_USEPOLLING: ${CHOKIDAR_USEPOLLING:-1}
      WATCHPACK_POLLING: ${WATCHPACK_POLLING:-true}
    volumes:
      - ./services/web-app:/app
      - web_app_node_modules:/app/node_modules
      - web_app_next_cache:/app/.next
      - web_app_pnpm_store:/pnpm/store
    ports:
      - "${WEB_APP_HOST_PORT:-3000}:3000"
    command:
      [
        "sh",
        "-c",
        "corepack enable && pnpm install --frozen-lockfile && pnpm dev --hostname 0.0.0.0 --port 3000",
      ]

volumes:
  api_gateway_postgres_data:
  api_gateway_node_modules:
  api_gateway_pnpm_store:
  process_data_ia_postgres_data:
  data_search_redis_data:
  rabbitmq_data:
  data_indexing_meilisearch_data:
  process_data_ia_node_modules:
  process_data_ia_pnpm_store:
  data_search_go_pkg_cache:
  data_search_go_build_cache:
  data_indexing_deps:
  data_indexing_build:
  data_indexing_mix:
  web_app_node_modules:
  web_app_next_cache:
  web_app_pnpm_store:
