name: Docker Build & Push

on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────
  # Detecta quais serviços foram alterados
  # ──────────────────────────────────────────────
  changes:
    name: Detectar mudanças
    runs-on: ubuntu-latest
    outputs:
      api-gateway: ${{ steps.filter.outputs.api-gateway }}
      process-data-ia: ${{ steps.filter.outputs.process-data-ia }}
      users: ${{ steps.filter.outputs.users }}
      web-app: ${{ steps.filter.outputs.web-app }}
      data-search: ${{ steps.filter.outputs.data-search }}
      data-indexing: ${{ steps.filter.outputs.data-indexing }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api-gateway:
              - 'services/api-gateway/**'
              - 'packages/**'
            process-data-ia:
              - 'services/process-data-ia/**'
              - 'packages/**'
            users:
              - 'services/users/**'
              - 'packages/**'
            web-app:
              - 'services/web-app/**'
            data-search:
              - 'services/data-search/**'
            data-indexing:
              - 'services/data-indexing/**'

  # ──────────────────────────────────────────────
  # Shared template (via composite action inline)
  # ──────────────────────────────────────────────
  api-gateway:
    name: "docker · api-gateway"
    needs: changes
    if: needs.changes.outputs.api-gateway == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository_owner }}/score-cripto-api-gateway
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest
      - uses: docker/build-push-action@v6
        with:
          context: services/api-gateway
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=api-gateway
          cache-to: type=gha,mode=max,scope=api-gateway

  process-data-ia:
    name: "docker · process-data-ia"
    needs: changes
    if: needs.changes.outputs.process-data-ia == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository_owner }}/score-cripto-process-data-ia
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest
      - uses: docker/build-push-action@v6
        with:
          context: services/process-data-ia
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=process-data-ia
          cache-to: type=gha,mode=max,scope=process-data-ia

  users:
    name: "docker · users"
    needs: changes
    if: needs.changes.outputs.users == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository_owner }}/score-cripto-users
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest
      - uses: docker/build-push-action@v6
        with:
          context: services/users
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=users
          cache-to: type=gha,mode=max,scope=users

  web-app:
    name: "docker · web-app"
    needs: changes
    if: needs.changes.outputs.web-app == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository_owner }}/score-cripto-web-app
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest
      - uses: docker/build-push-action@v6
        with:
          context: services/web-app
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=web-app
          cache-to: type=gha,mode=max,scope=web-app

  data-search:
    name: "docker · data-search"
    needs: changes
    if: needs.changes.outputs.data-search == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository_owner }}/score-cripto-data-search
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest
      - uses: docker/build-push-action@v6
        with:
          context: services/data-search
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=data-search
          cache-to: type=gha,mode=max,scope=data-search

  data-indexing:
    name: "docker · data-indexing"
    needs: changes
    if: needs.changes.outputs.data-indexing == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository_owner }}/score-cripto-data-indexing
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest
      - uses: docker/build-push-action@v6
        with:
          context: services/data-indexing
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=data-indexing
          cache-to: type=gha,mode=max,scope=data-indexing
